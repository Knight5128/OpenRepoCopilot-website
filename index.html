<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="./assets/openrepo-copilot-logo.png" />
    <title>OpenRepoCopilot | 本地优先的 AI 仓库知识工作台</title>
    <meta
      name="description"
      content="OpenRepoCopilot 将 GitHub 仓库、文档集合与项目图谱转化为可探索、可搜索、可复用的交互式知识图谱。下载客户端或一键安装全套 skill。"
    />
    <script>
      // Apply the saved theme before first paint to avoid a flash of the wrong palette.
      (function () {
        try {
          var stored = localStorage.getItem("openrepo-theme") || "dark";
          var resolved =
            stored === "system"
              ? window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light"
              : stored;
          document.documentElement.dataset.theme = resolved;
          document.documentElement.dataset.themeChoice = stored;
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
